<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<title>AI Music — Pixelia Pictures</title>
<style>
  :root { --yellow: #E8FF00; --black: #060606; --dark: #0d0d0d; --white: #f0f0f0; --mono: 'Space Mono', monospace; --display: 'Bebas Neue', sans-serif; --body: 'DM Sans', sans-serif; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: var(--body); overflow-x: hidden; cursor: none; }
  .cursor { position: fixed; width: 12px; height: 12px; background: var(--yellow); border-radius: 50%; pointer-events: none; z-index: 9999; mix-blend-mode: difference; }
  .cursor-ring { position: fixed; width: 36px; height: 36px; border: 1px solid var(--yellow); border-radius: 50%; pointer-events: none; z-index: 9998; mix-blend-mode: difference; transition: all 0.15s ease; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 24px 48px; background: rgba(6,6,6,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(232,255,0,0.08); }
  .nav-logo { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--yellow); text-decoration: none; }
  .nav-links { display: flex; gap: 40px; list-style: none; }
  .nav-links a { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--white); text-decoration: none; opacity: 0.5; transition: opacity 0.2s, color 0.2s; }
  .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--yellow); }
  .nav-links a.cta { color: var(--yellow); opacity: 0.8; border-bottom: 1px solid rgba(232,255,0,0.3); padding-bottom: 2px; }
  .hero { min-height: 100vh; display: flex; align-items: center; padding: 160px 48px 80px; position: relative; overflow: hidden; }
  .grid-overlay { position: absolute; inset: 0; background-image: linear-gradient(rgba(232,255,0,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(232,255,0,0.025) 1px, transparent 1px); background-size: 80px 80px; pointer-events: none; }
  .page-title { font-family: var(--display); font-size: clamp(72px, 11vw, 150px); line-height: 0.9; position: relative; z-index: 2; }
  .page-title .outline { color: transparent; -webkit-text-stroke: 1px rgba(232,255,0,0.3); }
  footer { padding: 48px; background: var(--dark); border-top: 1px solid rgba(232,255,0,0.15); display: flex; justify-content: space-between; align-items: center; }
  .footer-logo { font-family: var(--mono); font-size: 11px; letter-spacing: 0.25em; color: var(--yellow); text-transform: uppercase; }
  .footer-copy { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; color: rgba(240,240,240,0.2); text-transform: uppercase; }
  .footer-links { display: flex; gap: 28px; list-style: none; }
  .footer-links a { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(240,240,240,0.35); text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--yellow); }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<nav>
  <a href="index.html" class="nav-logo">Pixelia Pictures</a>
  <ul class="nav-links">
    <li><a href="pixeliapictures-ai-images.html">AI Images</a></li>
    <li><a href="pixeliapictures-ai-video.html">AI Video</a></li>
    <li><a href="pixeliapictures-ai-music.html">AI Music</a></li>
    <li><a href="pixeliapictures-about.html">About</a></li>
    <li><a href="pixeliapictures-your-website.html" class="cta">Your Website ↗</a></li>
  </ul>
</nav>
<section class="hero">
  <div class="grid-overlay"></div>
  <h1 class="page-title">AI<br><span class="outline">MUSIC</span></h1>
</section>
<footer>
  <div class="footer-logo">Pixelia Pictures</div>
  <p class="footer-copy">© 2025 Pixelia Pictures — Budapest</p>
  <ul class="footer-links">
    <li><a href="#">Instagram</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</footer>
<script>
  const cursor = document.getElementById("cursor");
  const ring = document.getElementById("cursorRing");
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx-6+"px";cursor.style.top=my-6+"px";});
  function animateRing(){rx+=(mx-rx-18)*0.12;ry+=(my-ry-18)*0.12;ring.style.left=rx+"px";ring.style.top=ry+"px";requestAnimationFrame(animateRing);}
  animateRing();
  document.querySelectorAll("a").forEach(el=>{el.addEventListener("mouseenter",()=>{cursor.style.transform="scale(2)";ring.style.transform="scale(1.5)";});el.addEventListener("mouseleave",()=>{cursor.style.transform="scale(1)";ring.style.transform="scale(1)";});});
</script>
</body>
</html>
